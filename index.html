<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مراقبة مباشر - يعمل دائماً</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            color: white;
            text-align: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        .video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            flex: 1;
            min-width: 150px;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-green {
            background: #00e676;
            color: #000;
        }
        .btn-blue {
            background: #2196f3;
            color: #fff;
        }
        .btn-red {
            background: #f44336;
            color: #fff;
        }
        .info-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            word-break: break-all;
        }
        .link-box {
            background: #1a1a2e;
            border: 2px solid #00e676;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            cursor: pointer;
        }
        .status {
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin: 10px 0;
            font-size: 14px;
            text-align: center;
        }
        hr {
            border-color: #444;
            margin: 20px 0;
        }
        @media (max-width: 500px) {
            button { padding: 12px 15px; font-size: 14px; min-width: 120px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📹 نظام مراقبة مباشر</h1>
    
    <div class="video-container">
        <video id="localVideo" autoplay playsinline muted style="display: none;"></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button class="btn-green" id="startBtn">📷 تشغيل الكاميرا</button>
        <button class="btn-blue" id="stopBtn" disabled>⏹️ إيقاف الكاميرا</button>
    </div>

    <div class="status" id="status">
        🔴 النظام جاهز - اضغط "تشغيل الكاميرا" لبدء البث
    </div>

    <hr>

    <div id="broadcastSection" style="display: none;">
        <h3>📤 رابط البث الخاص بك (أرسله للمشاهد):</h3>
        <div class="link-box" id="linkBox" onclick="copyLink()">
            جاري إنشاء الرابط...
        </div>
        <button class="btn-blue" onclick="copyLink()">📋 نسخ الرابط</button>
    </div>

    <div id="watchSection">
        <h3>👀 مشاهدة كاميرا أخرى:</h3>
        <input type="text" id="remoteLink" placeholder="الصق رابط البث هنا">
        <button class="btn-blue" onclick="watchCamera()">🔗 مشاهدة البث</button>
    </div>

    <div class="info-box">
        💡 <strong>طريقة الاستخدام:</strong><br>
        1️⃣ جهاز المراقبة: اضغط "تشغيل الكاميرا" ← انسخ الرابط ← أرسله للمشاهد<br>
        2️⃣ جهاز المشاهدة: الصق الرابط ← اضغط "مشاهدة البث"
    </div>
</div>

<script>
    // عناصر الصفحة
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const statusDiv = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const broadcastSection = document.getElementById('broadcastSection');
    const linkBox = document.getElementById('linkBox');
    const remoteLinkInput = document.getElementById('remoteLink');

    let localStream = null;
    let peerConnection = null;
    let currentRoomId = null;

    // إعدادات خادم STUN (للتغلب على جدران الحماية)
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ]
    };

    // إنشاء رابط فريد
    function generateRoomId() {
        return 'cam_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now().toString(36);
    }

    // تشغيل الكاميرا
    async function startCamera() {
        try {
            statusDiv.innerHTML = '📷 جاري طلب إذن الكاميرا...';
            
            if (localStream) {
                stopTracks(localStream);
            }

            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });
            
            localVideo.srcObject = localStream;
            localVideo.style.display = 'block';
            remoteVideo.style.display = 'none';
            
            statusDiv.innerHTML = '✅ الكاميرا تعمل. جاري إنشاء رابط البث...';
            
            // إنشاء غرفة جديدة
            currentRoomId = generateRoomId();
            await createOffer(currentRoomId);
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            broadcastSection.style.display = 'block';
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = '❌ فشل تشغيل الكاميرا: ' + error.message;
        }
    }

    // إيقاف الكاميرا
    function stopCamera() {
        if (localStream) {
            stopTracks(localStream);
            localStream = null;
        }
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        localVideo.style.display = 'none';
        localVideo.srcObject = null;
        remoteVideo.style.display = 'block';
        
        startBtn.disabled = false;
        stopBtn.disabled = true;
        broadcastSection.style.display = 'none';
        currentRoomId = null;
        
        statusDiv.innerHTML = '🔴 تم إيقاف الكاميرا';
    }

    // إيقاف المسارات
    function stopTracks(stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    // إنشاء عرض (للجهاز الباث)
    async function createOffer(roomId) {
        if (peerConnection) {
            peerConnection.close();
        }
        
        peerConnection = new RTCPeerConnection(configuration);
        
        // إضافة مسارات الفيديو والصوت
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });
        
        // تخزين المرشحات
        let candidates = [];
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                candidates.push(event.candidate);
                updateLink(roomId, peerConnection.localDescription.sdp, candidates);
            }
        };
        
        peerConnection.onconnectionstatechange = () => {
            if (peerConnection.connectionState === 'connected') {
                statusDiv.innerHTML = '🟢 هناك مشاهد يتصل بك الآن!';
            } else if (peerConnection.connectionState === 'disconnected') {
                statusDiv.innerHTML = '⚠️ انقطع الاتصال بالمشاهد';
            }
        };
        
        // إنشاء العرض
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        updateLink(roomId, offer.sdp, candidates);
    }
    
    // تحديث الرابط المعروض
    function updateLink(roomId, sdp, candidates) {
        const data = {
            roomId: roomId,
            sdp: sdp,
            candidates: candidates
        };
        
        const encoded = btoa(JSON.stringify(data));
        const link = window.location.href.split('#')[0] + '#room=' + encoded;
        linkBox.innerHTML = link;
        linkBox.setAttribute('data-link', link);
    }
    
    // نسخ الرابط
    function copyLink() {
        const link = linkBox.getAttribute('data-link');
        if (link && link !== 'جاري إنشاء الرابط...') {
            navigator.clipboard.writeText(link);
            statusDiv.innerHTML = '📋 تم نسخ الرابط! أرسله للمشاهد';
            alert('✅ تم نسخ الرابط\nأرسله إلى الشخص الذي يريد مشاهدة الكاميرا');
        } else {
            alert('⚠️ انتظر حتى يتم إنشاء الرابط');
        }
    }
    
    // مشاهدة كاميرا (للمشاهد)
    async function watchCamera() {
        const link = remoteLinkInput.value.trim();
        
        if (!link) {
            alert('⚠️ الرجاء لصق رابط البث');
            return;
        }
        
        try {
            statusDiv.innerHTML = '🔄 جاري الاتصال بالكاميرا...';
            
            // استخراج البيانات من الرابط
            let encoded;
            if (link.includes('#room=')) {
                encoded = link.split('#room=')[1];
            } else {
                encoded = link;
            }
            
            const data = JSON.parse(atob(encoded));
            
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            // استقبال الفيديو
            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    remoteVideo.style.display = 'block';
                    localVideo.style.display = 'none';
                    statusDiv.innerHTML = '🟢 متصل! يتم عرض الكاميرا';
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'failed') {
                    statusDiv.innerHTML = '❌ فشل الاتصال. حاول مرة أخرى';
                }
            };
            
            // إضافة المرشحات المحفوظة
            if (data.candidates && data.candidates.length) {
                for (const candidate of data.candidates) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch(e) { console.log(e); }
                }
            }
            
            // تعيين الوصف البعيد
            await peerConnection.setRemoteDescription(new RTCSessionDescription({
                type: 'offer',
                sdp: data.sdp
            }));
            
            // إنشاء الإجابة
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            // يمكن إرسال الإجابة عبر console فقط (للتطوير)
            console.log('Answer created:', answer);
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = '❌ فشل الاتصال: ' + error.message;
            alert('فشل الاتصال. تأكد من أن جهاز المراقبة لا يزال يبث');
        }
    }
    
    // التحقق من وجود رابط في URL عند التحميل
    window.addEventListener('load', () => {
        if (window.location.hash && window.location.hash.includes('#room=')) {
            const roomLink = window.location.href;
            remoteLinkInput.value = roomLink;
            statusDiv.innerHTML = '📲 تم اكتشاف رابط بث! اضغط "مشاهدة البث"';
        }
    });
    
    // ربط الأزرار
    startBtn.onclick = startCamera;
    stopBtn.onclick = stopCamera;
</script>

</body>
</html>
