<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المراقبة الخاص بي</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: white; padding: 20px; }
        .video-container { position: relative; width: 100%; max-width: 500px; margin: auto; border: 4px solid #4CAF50; border-radius: 15px; overflow: hidden; background: black; }
        video { width: 100%; display: block; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; width: 200px; }
        .btn-start { background-color: #4CAF50; color: white; }
        .btn-call { background-color: #2196F3; color: white; }
        input { padding: 10px; border-radius: 5px; border: none; width: 180px; text-align: center; }
        .status { margin: 10px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <h2>نظام مراقبة HTML 🛡️</h2>
    
    <div class="status" id="status">جاري الاتصال بالسيرفر...</div>
    <div id="myIdDisplay">معرف الجهاز الخاص بك: <span id="peer-id" style="color:#00e676">---</span></div>

    <div class="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button class="btn-start" onclick="startCamera()">1. بدء البث من هذا الهاتف</button>
        
        <hr style="width: 80%; border: 0.5px solid #444;">

        <p>لمشاهدة بث هاتف آخر، أدخل معرفه هنا:</p>
        <input type="text" id="remotePeerId" placeholder="أدخل معرف الكاميرا">
        <button class="btn-call" onclick="connectToCamera()">2. عرض البث الآن</button>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const peerIdDisplay = document.getElementById('peer-id');
        const remoteVideo = document.getElementById('remoteVideo');
        let localStream;

        // إنشاء اتصال Peer جديد (سيعطيك ID تلقائي)
        const peer = new Peer();

        // عند فتح الصفحة، يعطيك السيرفر ID خاص بهذا الهاتف
        peer.on('open', (id) => {
            peerIdDisplay.innerText = id;
            statusText.innerText = "جاهز للاتصال";
        });

        // هاتف الكاميرا: تشغيل الكاميرا وانتظار اتصال الهاتف الآخر
        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                // عرض الفيديو الخاص بك محلياً للتأكد
                remoteVideo.srcObject = localStream;
                statusText.innerText = "الكاميرا تعمل.. في انتظار المشاهد";

                // عندما يتصل بك شخص ما (هاتف المشاهد)
                peer.on('call', (call) => {
                    call.answer(localStream); // إرسال البث له
                    statusText.innerText = "متصل الآن ويتم البث!";
                });
            } catch (err) {
                alert("خطأ في الوصول للكاميرا: " + err);
            }
        }

        // هاتف المشاهد: الاتصال بهاتف الكاميرا باستخدام الـ ID
        function connectToCamera() {
            const remoteId = document.getElementById('remotePeerId').value;
            if (!remoteId) return alert("من فضلك أدخل معرف الكاميرا أولاً");

            statusText.innerText = "جاري الاتصال بالكاميرا...";
            const call = peer.call(remoteId, null); // طلب البث (بدون إرسال كاميرا المشاهد)

            call.on('stream', (stream) => {
                remoteVideo.srcObject = stream; // عرض فيديو الكاميرا البعيدة
                statusText.innerText = "أنت تشاهد البث المباشر الآن";
            });
        }
    </script>
</body>
</html>
