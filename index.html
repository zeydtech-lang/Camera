<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة الذكي 🛡️</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #00e676; --secondary: #2196F3; --bg: #121212; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: white; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .video-box { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border: 3px solid #333; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .id-section { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .peer-id { color: var(--primary); font-family: monospace; font-size: 1.1em; word-break: break-all; cursor: pointer; }
        .btn { padding: 15px 25px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-start { background-color: var(--primary); color: #000; }
        .btn-call { background-color: var(--secondary); color: white; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; text-align: center; margin-bottom: 10px; font-size: 16px; }
        .status { font-size: 0.9em; color: #bbb; margin-bottom: 10px; height: 20px; }
        hr { border: 0; border-top: 1px dotted #444; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام مراقبة مباشر 🎥</h2>
    
    <div class="status" id="status">جاري تهيئة النظام...</div>

    <div class="video-box">
        <video id="displayVideo" autoplay playsinline muted></video>
    </div>

    <div class="id-section">
        <div>معرف هذا الجهاز (اضغط للنسخ):</div>
        <div class="peer-id" id="peer-id" onclick="copyId()">... جاري التحميل ...</div>
    </div>

    <button class="btn btn-start" onclick="setupCamera()">
        <span>📷</span> تشغيل الكاميرا من هذا الهاتف
    </button>

    <hr>

    <p>لمشاهدة هاتف آخر، أدخل معرفه:</p>
    <input type="text" id="remotePeerId" placeholder="أدخل ID الكاميرا هنا">
    <button class="btn btn-call" onclick="startViewing()">
        <span>👁️</span> عرض البث الآن
    </button>
</div>

<script>
    const statusText = document.getElementById('status');
    const peerIdDisplay = document.getElementById('peer-id');
    const videoElement = document.getElementById('displayVideo');
    let myStream;

    // 1. إنشاء الاتصال
    const peer = new Peer();

    peer.on('open', (id) => {
        peerIdDisplay.innerText = id;
        statusText.innerText = "جاهز للاتصال ✅";
    });

    peer.on('error', (err) => {
        console.error(err);
        statusText.innerText = "حدث خطأ في الاتصال!";
        alert("خطأ: " + err.type);
    });

    // 2. وظيفة الكاميرا (للهاتف الذي سيراقب)
    async function setupCamera() {
        try {
            statusText.innerText = "جاري طلب إذن الكاميرا...";
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, // محاولة فتح الكاميرا الخلفية تلقائياً
                audio: true 
            });
            
            videoElement.srcObject = myStream;
            statusText.innerText = "الكاميرا تعمل.. في انتظار المشاهد 📡";

            // استقبال المكالمات (البث)
            peer.on('call', (call) => {
                statusText.innerText = "هناك شخص يشاهد البث الآن!";
                call.answer(myStream); 
            });

        } catch (err) {
            statusText.innerText = "فشل فتح الكاميرا!";
            alert("تأكد من إعطاء إذن الكاميرا للمتصفح");
        }
    }

    // 3. وظيفة المشاهدة (للهاتف الذي سيراقب منه)
    function startViewing() {
        const remoteId = document.getElementById('remotePeerId').value;
        if (!remoteId) return alert("يرجى إدخال المعرف أولاً");

        statusText.innerText = "جاري الاتصال...";
        const call = peer.call(remoteId, null);

        call.on('stream', (remoteStream) => {
            statusText.innerText = "متصل بالبث المباشر 🟢";
            videoElement.srcObject = remoteStream;
            // تفعيل الصوت عند المشاهدة
            videoElement.muted = false; 
        });
    }

    // وظيفة النسخ السريع
    function copyId() {
        const id = peerIdDisplay.innerText;
        navigator.clipboard.writeText(id);
        alert("تم نسخ المعرف: " + id);
    }
</script>

</body>
</html>
